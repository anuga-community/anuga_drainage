# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    # Install the package itself (pulls numpy/pandas) so autodoc can import it;
    # the heavy/optional backends (anuga, pyswmm, pipedream) are mocked in conf.py.
    - method: pip
      path: .
    - requirements: docs/requirements.txt

formats:
  - pdf
  - htmlzip
