name: pip

# Installs ANUGA and this package from PyPI wheels (the pip path, as opposed to
# conda-env.yml which uses conda-forge) and runs the full test suite on all
# three OSes. This lane exercises the published wheels, so it catches
# wheel-packaging problems: it found the macOS arm64 (missing libomp) bug, fixed
# in ANUGA 3.3.7. Windows is currently an allowed-failure for a *dependency*
# wheel bug (meshpy — see the job-level note below), not an ANUGA issue.

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - pyproject.toml
      - 'src/**'
      - 'tests/**'
      - .github/workflows/pip.yml
  workflow_dispatch:

jobs:
  pip:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Windows is allowed to fail due to an upstream *meshpy* bug (not ANUGA):
    # meshpy's MinGW-built Windows wheel doesn't bundle its runtime DLLs
    # (libstdc++-6.dll, libgcc_s_seh-1.dll), so `import meshpy._internals` fails
    # on a clean pip install ("DLL load failed"). ANUGA's own 3.3.7 wheel is
    # fine. Tracking: inducer/meshpy#150. Drop this once meshpy ships a
    # self-contained Windows wheel.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    defaults:
      run:
        shell: bash   # bash on every OS (Git Bash on Windows) for the heredoc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ANUGA (PyPI wheel) + package and backends
        run: |
          python -m pip install --upgrade pip
          pip install anuga==3.3.7
          pip install -e .[swmm,pipedream,test]

      - name: Show key versions
        run: |
          python - <<'PY'
          import importlib.metadata as md
          for p in ["anuga", "numpy", "pandas", "pyswmm", "pipedream-solver", "anuga_drainage"]:
              try:
                  print(f"{p:18} {md.version(p)}")
              except md.PackageNotFoundError:
                  print(f"{p:18} (not found)")
          import anuga, pyswmm, pipedream_solver, anuga_drainage  # noqa: F401
          print("imports OK")
          PY

      - name: Run full test suite (with ANUGA)
        run: pytest -v
