name: pip

# Installs ANUGA and this package from PyPI wheels (the pip path, as opposed to
# conda-env.yml which uses conda-forge) and runs the full test suite on all
# three OSes. This lane exercises the published ANUGA *wheels*, so it catches
# wheel-packaging problems — e.g. the macOS arm64 wheel needing libomp at
# runtime (see the macOS-only step below).

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - pyproject.toml
      - 'src/**'
      - 'tests/**'
      - .github/workflows/pip.yml
  workflow_dispatch:

jobs:
  pip:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # Windows is allowed to fail: the published ANUGA win wheel has unbundled
    # DLLs ("DLL load failed while importing polygon_ext"). A fix (delvewheel
    # repair) is in anuga_core; drop this once a repaired win wheel is released.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    defaults:
      run:
        shell: bash   # bash on every OS (Git Bash on Windows) for the heredoc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The ANUGA arm64 macOS wheel links @rpath/libomp.dylib but doesn't bundle
      # it, so `import anuga` fails on a plain pip install without libomp. Provide
      # it via brew. (A fix to bundle libomp is pending in anuga_core's wheel
      # build; once a fixed wheel is released this step can be removed.)
      - name: Install libomp (macOS wheel needs OpenMP runtime)
        if: runner.os == 'macOS'
        run: |
          brew install libomp
          echo "DYLD_LIBRARY_PATH=$(brew --prefix libomp)/lib" >> "$GITHUB_ENV"

      - name: Install ANUGA (PyPI wheel) + package and backends
        run: |
          python -m pip install --upgrade pip
          pip install anuga==3.3.6
          pip install -e .[swmm,pipedream,test]

      - name: Show key versions
        run: |
          python - <<'PY'
          import importlib.metadata as md
          for p in ["anuga", "numpy", "pandas", "pyswmm", "pipedream-solver", "anuga_drainage"]:
              try:
                  print(f"{p:18} {md.version(p)}")
              except md.PackageNotFoundError:
                  print(f"{p:18} (not found)")
          import anuga, pyswmm, pipedream_solver, anuga_drainage  # noqa: F401
          print("imports OK")
          PY

      - name: Run full test suite (with ANUGA)
        run: pytest -v
