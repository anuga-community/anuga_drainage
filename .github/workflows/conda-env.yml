name: conda-env

# Validates that environment.yml actually solves and works end to end: it
# creates the conda env (ANUGA 3.3.6 from conda-forge + this package + both
# backends) and runs the FULL test suite, including the tests that need ANUGA
# (which the fast `tests` workflow skips). Heavier than `tests`, so it only runs
# on main/develop pushes and on PRs that touch the env or package.

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - environment.yml
      - pyproject.toml
      - 'src/**'
      - 'tests/**'
      - .github/workflows/conda-env.yml
  workflow_dispatch:

jobs:
  conda-env:
    strategy:
      fail-fast: false
      matrix:
        # conda-forge ships ANUGA for linux-64, win-64 and osx-64 but NOT
        # osx-arm64, so macOS is tested on macos-13 (the Intel runner); the
        # arm64 `macos-latest` would fail to solve.
        os: [ubuntu-latest, windows-latest, macos-13]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}   # login shell so the created env is activated (all OSes)
    steps:
      - uses: actions/checkout@v4

      - name: Create env from environment.yml
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: Show key versions
        run: |
          python - <<'PY'
          import importlib.metadata as md
          for p in ["anuga", "numpy", "pandas", "pyswmm", "pipedream-solver", "anuga_drainage"]:
              try:
                  print(f"{p:18} {md.version(p)}")
              except md.PackageNotFoundError:
                  print(f"{p:18} (not found)")
          import anuga, pyswmm, pipedream_solver, anuga_drainage  # noqa: F401
          print("imports OK")
          PY

      - name: Run full test suite (with ANUGA)
        run: pytest -v
