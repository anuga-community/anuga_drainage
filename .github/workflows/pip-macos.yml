name: pip-macos

# Tests the pip install path on Apple Silicon (macos-latest = arm64).
#
# conda-forge has no osx-arm64 ANUGA build (so the conda-env workflow can't
# cover Apple Silicon), but anuga_core publishes an arm64 PyPI wheel
# (macosx_*_arm64) for each release. So arm64 macOS is covered here via pip
# rather than conda. ANUGA is installed from PyPI (not declared as a package
# dependency — it is environment-provided); the rest comes from the project's
# extras.

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - pyproject.toml
      - 'src/**'
      - 'tests/**'
      - .github/workflows/pip-macos.yml
  workflow_dispatch:

jobs:
  pip-macos:
    runs-on: macos-latest   # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ANUGA (PyPI arm64 wheel) + package and backends
        run: |
          python -m pip install --upgrade pip
          pip install anuga==3.3.6
          pip install -e .[swmm,pipedream,test]

      - name: Show key versions
        run: |
          python - <<'PY'
          import importlib.metadata as md
          for p in ["anuga", "numpy", "pandas", "pyswmm", "pipedream-solver", "anuga_drainage"]:
              try:
                  print(f"{p:18} {md.version(p)}")
              except md.PackageNotFoundError:
                  print(f"{p:18} (not found)")
          import anuga, pyswmm, pipedream_solver, anuga_drainage  # noqa: F401
          print("imports OK")
          PY

      - name: Run full test suite (with ANUGA)
        run: pytest -v
